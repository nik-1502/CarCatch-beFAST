<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101114">
    <title>CarCatch – Be Fast</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="800" height="600" aria-label="CarCatch – Be Fast Spiel"></canvas>
      <section class="mobile-controls" aria-label="Mobile Steuerung">
        <div class="joystick" role="application" aria-label="Virtueller Joystick">
          <div class="joystick-ring"></div>
          <div class="joystick-stick"></div>
        </div>
        <span class="joystick-label">DRIVE</span>
      </section>
      <section class="mobile-auth" aria-label="Account-Anmeldung" hidden></section>
    </main>
    <script type="module" src="game.js"></script>
    <script type="module" src="mobile.js"></script>
  </body>
</html>
