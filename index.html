<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101114">
    <title>CarCatch – Be Fast</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" width="800" height="600" aria-label="CarCatch – Be Fast Spiel"></canvas>
      <section class="mobile-controls" aria-label="Mobile Steuerung">
        <div class="joystick" role="application" aria-label="Virtueller Joystick">
          <div class="joystick-ring"></div>
          <div class="joystick-stick"></div>
        </div>
        <span class="joystick-label">DRIVE</span>
      </section>
      <section class="mobile-auth" aria-label="Account-Anmeldung" hidden></section>
      <nav class="mobile-landscape-actions" aria-label="Mobile Navigation" hidden>
        <div class="mobile-landscape-left">
          <button type="button" data-mobile-action="profile" aria-label="Benutzerprofil"><svg viewBox="0 0 88 88" aria-hidden="true"><circle cx="44" cy="29" r="13"/><path d="M21 69c2-18 12-27 23-27s21 9 23 27z"/></svg></button>
          <button type="button" data-mobile-action="leaderboard" aria-label="Bestenliste"><svg viewBox="0 0 88 88" aria-hidden="true"><path d="M18 28l15 21 11-27 11 27 15-21-7 35H25z"/><rect x="24" y="67" width="40" height="7" rx="2"/></svg></button>
        </div>
        <button type="button" class="mobile-landscape-back" data-mobile-action="back">Back</button>
      </nav>
      <button type="button" class="mobile-gameplay-back" aria-label="Spiel verlassen" hidden>Back</button>
    </main>
    <script type="module" src="game.js"></script>
    <script type="module" src="mobile.js"></script>
  </body>
</html>
